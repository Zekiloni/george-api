name: Build & Push Java Image

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      java-distribution:
        required: false
        type: string
        default: 'temurin'
      java-version:
        required: false
        type: string
        default: '25'
      image-name:
        required: true
        type: string
      maven-path:
        required: true
        type: string
      env:
        required: true
        type: string
    secrets:
      GHCR_ACCESS_TOKEN:
        required: true
      GIT_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          cache: 'maven'

      # `--enable-preview` is configured inside the pom; mvn picks it up.
      # Tests are skipped here — they run in a separate workflow gate
      # (TODO: wire `mvn verify` once Testcontainers is healthy in CI).
      - name: Build with Maven
        run: mvn -f ${{ inputs.maven-path }} clean package -DskipTests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_ACCESS_TOKEN }}

      # Build context is the REPO ROOT — Dockerfile sits there and references
      # `target/*.jar` written by the previous step.
      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ inputs.image-name }}:${{ github.sha }}
            ${{ inputs.image-name }}:${{ inputs.env }}-latest

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: Zekiloni/george-gitops
          token: ${{ secrets.GIT_TOKEN }}
          path: gitops

      # Bumps the `newTag` field of the matching entry in
      # k8s/overlays/<env>/kustomization.yaml's `images:` block. The block
      # must already exist with a placeholder — see the gitops repo overlays.
      - name: Bump image tag in gitops
        uses: fjogeleit/yaml-update-action@main
        with:
          repository: Zekiloni/george-gitops
          token: ${{ secrets.GIT_TOKEN }}
          workDir: gitops
          valueFile: k8s/overlays/${{ inputs.env }}/kustomization.yaml
          propertyPath: $.images[?(@.name=='${{ inputs.image-name }}')].newTag
          value: ${{ github.sha }}
          commitChange: true
          message: "deploy(${{ inputs.service-name }}): ${{ inputs.env }} -> ${{ github.sha }}"
