name: API Deployment

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Deployment environment (matches gitops overlay name)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Dockerfile & pom.xml exist
        run: |
          test -f Dockerfile || { echo "❌ Dockerfile not found"; exit 1; }
          test -f pom.xml    || { echo "❌ pom.xml not found";    exit 1; }
          echo "✅ Validation passed"

  deploy:
    name: Build & Push Image
    needs: validate
    uses: ./.github/workflows/java-build.yml
    with:
      service-name: george-api
      dockerfile: Dockerfile
      image-name: ghcr.io/zekiloni/george-api
      maven-path: pom.xml
      env: ${{ github.event.inputs.env }}
    secrets:
      GHCR_ACCESS_TOKEN: ${{ secrets.GHCR_ACCESS_TOKEN }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
