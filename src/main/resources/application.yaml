# Logging
logging:
  level:
    org.springframework.web: INFO
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    # ── Batch verification ─────────────────────────────────────────
    org.hibernate.orm.jdbc.batch: TRACE