# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  base-url: ${APP_BASE_URL:http://localhost:4200}
  lifecycle:
    renewal-notice-days: ${RENEWAL_NOTICE_DAYS:3}
    grace-period-days: ${GRACE_PERIOD_DAYS:1}
  usage:
    # Platform-wide fallback when a ServiceAccess has no `dailyLimit`
    # characteristic. Per-access overrides come from the catalog (TMF
    # ServiceSpecification → Offering → OrderItem.characteristic).
    default-daily-limit: ${APP_USAGE_DEFAULT_DAILY_LIMIT:50000}
  outreach:
    # Shared bearer token for the delivery-event webhook (POST /api/v1/outreach/events).
    # Configure on every provider that pushes delivery outcomes back (Stalwart bounce
    # poller, Postal, EJOIN DLR, etc.). Leave blank in dev to skip auth.
    delivery-webhook-secret: ${APP_OUTREACH_DELIVERY_WEBHOOK_SECRET:}
  mail2sms:
    # (country, carrier) → mail2SMS recipient host used by SMTP-to-SMS gateways.
    # MVNOs ride their host carrier's domain (Fido/Virgin → Bell). Unknown
    # carriers fall back to the gateway's default in SmtpGatewayDispatcherAdapter.
    mappings:
      ca:
        bell: txt.bell.ca
        fido: txt.bell.ca
        virgin: vmobl.com
        rogers: pcs.rogers.com
        telus: msg.telus.com
        koodo: msg.telus.com
        chatr: pcs.rogers.com
        freedom: txt.freedommobile.ca
  storage:
    type: ${APP_STORAGE_TYPE:local}
    local:
      # Where uploaded attachments are written. Default is `uploads` (relative,
      # resolves to /app/uploads in the container) for local-dev convenience.
      # In k8s set this to a path backed by a writable PVC (e.g. /var/data/uploads)
      # via APP_STORAGE_LOCAL_PATH env var on the Deployment.
      path: ${APP_STORAGE_LOCAL_PATH:uploads}

# API Configuration
api:
  base:
    path: /api/v1
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}

# Spring Application Configuration
spring:
  application:
    name: george-api

  threads:
    virtual:
      enabled: true

  # Security configuration for OAuth2 Resource Server using JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8686/realms/master}
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

  # DataSource configuration for PostgreSQL with HikariCP connection pooling
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost:5432}/${DB_NAME:george}?rewriteBatchedStatements=true
    username: ${DB_USERNAME:g-user}
    password: ${DB_PASSWORD:g-pw}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 3000

      # TODO: Consider using auto commit false for better transaction control, but ensure that transactions are properly managed in the application
      # auto-commit: false # Better for transaction control

  # JPA and Hibernate configuration for automatic schema generation and naming strategies
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    properties:
      hibernate:
        multiTenancy: DISCRIMINATOR
        order_updates: true
        order_inserts: true
        batch_versioned_data: true
        jdbc:
          batch_size: 50

  # Flyway configuration for database migrations
  flyway:
    enabled: false
    baseline-on-migrate: true
    validate-on-migrate: true

  # Servlet multipart file upload settings
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

  # Spring Boot 4 ships both Jackson 2 (com.fasterxml.jackson.databind) and
  # Jackson 3 (tools.jackson.databind) on the classpath and prefers Jackson 3
  # for HTTP conversion. Our DTOs and JacksonConfig still target Jackson 2
  # (annotations, ObjectMapper, modules), so force Jackson 2 until we migrate.
  http:
    converters:
      preferred-json-mapper: jackson2

btc-pay:
    store-id: ${BTC_PAY_STORE_ID:4YTS8vsii3jKm26PFauoCHzxFAjRy2WnBN3gbXesLzdr}
    api:
      base-url: ${BTC_PAY_URL:http://localhost:49392/api/v1}
      api-key: ${BTC_PAY_API_KEY:74a069139477a54999c59082fa98874a8c43c750}
    webhook:
      # HMAC-SHA256 secret configured in BTCPay's webhook UI. Leave blank in dev to skip
      # verification; required in prod to reject spoofed webhook calls.
      secret: ${BTC_PAY_WEBHOOK_SECRET:}

# Logging
logging:
  level:
    org.springframework.web: INFO
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG