spring:
  application:
    name: george-api

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8686/realms/master
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost:5432}/${DB_NAME:george}?rewriteBatchedStatements=true
    username: ${DB_USERNAME:g-user}
    password: ${DB_PASSWORD:g-pw}

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    properties:
      hibernate:
        multiTenancy: DISCRIMINATOR
        order_updates: true
        order_inserts: true
        batch_versioned_data: true
        jdbc:
          batch_size: 50

  flyway:
    enabled: false
    baseline-on-migrate: true
    validate-on-migrate: true

  # Servlet multipart file upload settings
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# API Configuration
api:
  base:
    path: /api/v1
  cors:
    allowed-origins: http://localhost:4200

btc-pay:
    store-id: 5PNvSLGDfwGYgcCWzmsAxAbXLXxqxk2twAtaeMbEdaq6
    api:
