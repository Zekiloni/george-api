spring:
  application:
    name: george-api

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8686/realms/master
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost:5432}/${DB_NAME:george}
    username: ${DB_USERNAME:g-user}
    password: ${DB_PASSWORD:g-pw}

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: true
    properties:
      hibernate:
        multiTenancy: DISCRIMINATOR
        format_sql: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    validate-on-migrate: true

  # Servlet multipart file upload settings
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# API Configuration
api:
  base:
    path: /api/v1
  cors:
    allowed-origins: http://localhost:4200

btc-pay:
    store-id: 5DU4njab753Lt1WY5Cc3bMsNyYczULpbDNEvsDGauZs5
    api:
      base-url: http://localhost:49392/api/v1
      api-key: 35b2e61f376258e91e935af2f6d7454166a5f368


# Logging
logging:
  level:
    com.vectorhaul.platform.operation: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
