# Relay login theme — inherits Keycloak's modern v2 login (PatternFly-based)
# and only overrides the look via the CSS file below. To override individual
# pages, drop a *.ftl into this directory with the same name as the parent's
# (e.g. `login.ftl`, `register.ftl`) and Keycloak will pick it up.
parent=keycloak.v2
import=common/keycloak

styles=css/styles.css
