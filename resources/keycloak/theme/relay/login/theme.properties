# Relay login theme — extends keycloak.v2 (the modern PatternFly-based login).
# We provide our own template.ftl + styles.css for chrome and a few key page
# FTLs (login, register, reset-password, etc.) for full control. Pages we
# don't override fall back to the parent and are restyled via CSS only.
parent=keycloak.v2
import=common/keycloak

styles=css/styles.css

# Pull in Inter for a modern sans, plus PF v5 (inherited from parent's
# stylesCommon). Our styles.css cascades on top.
meta=viewport==width=device-width,initial-scale=1

# Disable the parent's auto dark-mode toggle for now; flip to true when our
# CSS has dark variants for every override.
darkMode=false

# Our card chrome uses semantic IDs (kc-content, kc-form-buttons, etc.) so we
# don't override the parent's class list. styles.css targets PF classes plus
# our custom selectors.
