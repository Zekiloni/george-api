# Relay login theme — inherits Keywind (Tailwind-styled, modern login).
# Keywind ships every page (login, register, totp, oauth-grant, terms, …);
# we only override visual brand via css/overrides.css. Keywind itself is
# loaded as a provider JAR — see resources/keycloak/Dockerfile.
parent=keywind

styles=dist/index.css css/overrides.css
