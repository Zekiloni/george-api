# Relay account console theme — extends keycloak.v2's React-based account
# console (the only account theme Keycloak 26 ships).
#
# Modern Keycloak removed the classic FTL account templates, so a fully
# custom account console (with our own profile/password/sessions FTL
# pages) would mean implementing the Account REST API ourselves. For now
# we rely on the bundled SPA and re-skin it via CSS — the SPA picks up
# our styles.css through theme inheritance.
parent=keycloak.v3
import=common/keycloak

styles=css/styles.css

# Skip the auto dark-mode toggle the v3 account index.ftl injects. Until our
# CSS has a complete dark counterpart for every surface, letting it flip
# breaks form inputs (rendered with PF v5 dark tokens we don't restyle).
darkMode=false

# Custom branding picked up by the SPA's masthead.
logo=img/logo.svg
