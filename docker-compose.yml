name: 'george'
version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: g-postgres
    environment:
      POSTGRES_USER: g-user
      POSTGRES_PASSWORD: g-pw
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g-user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: g-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: g-user
      KC_DB_PASSWORD: g-pw
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - ./resources/keycloak/keywind.jar:/opt/keycloak/providers/keywind.jar
    command: start-dev
    ports:
      - "8686:8080"
    depends_on:
      - postgres

  bitcoind:
    image: bitcoin/bitcoin:30.2  # Zvanični image
    container_name: bitcoind
    command: [
      "-regtest",
      "-server",
      "-rpcuser=rpc",
      "-rpcpassword=rpc",
      "-rpcallowip=0.0.0.0/0",
      "-rpcbind=0.0.0.0",
      "-rpcport=18443",
      "-port=18444",
      "-fallbackfee=0.0001",
      "-printtoconsole",
      "-whitelist=0.0.0.0/0"
    ]
    ports:
      - "18443:18443"
      - "18444:18444"
    volumes:
      - bitcoin_data:/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=rpc", "-rpcpassword=rpc", "-rpcport=18443", "getblockchaininfo"]
      interval: 30s
      timeout: 5s
      retries: 10

  nbxplorer:
    image: nicolasdorier/nbxplorer:2.6.3
    container_name: nbxplorer
    depends_on:
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_started
    environment:
      NBXPLORER_NETWORK: regtest
      NBXPLORER_BTCRPCURL: "http://bitcoind:18443"
      NBXPLORER_BTCP2PENDPOINT: "bitcoind:18444"
      NBXPLORER_BTCRPCUSER: rpc
      NBXPLORER_BTCRPCPASSWORD: rpc
      NBXPLORER_POSTGRES: "User ID=g-user;Password=g-pw;Host=postgres;Port=5432;Database=nbxplorer;"
      NBXPLORER_BIND: "0.0.0.0"
      NBXPLORER_PORT: 32838
      NBXPLORER_NOAUTH: "true"
    ports:
      - "32838:32838"
    volumes:
      - nbxplorer_data:/datadir
      - ./resources/nbxplorer/regtest.config:/datadir/RegTest/settings.config


  btcpayserver:
    image: btcpayserver/btcpayserver:2.3.7
    container_name: btcpayserver
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "49392:49392"
    environment:
      BTCPAY_NETWORK: regtest
      BTCPAY_BIND: 0.0.0.0
      BTCPAY_PORT: 49392
      BTCPAY_POSTGRES: "User ID=g-user;Password=g-pw;Host=postgres;Port=5432;Database=btcpay;"
      BTCPAY_BTCEXPLORERURL: "http://nbxplorer:32838"
      BTCPAY_ALLOWANYHOST: "true"
      BTCPAY_DISABLE_SSH: "true"
    depends_on:
      postgres:
        condition: service_healthy
      nbxplorer:
        condition: service_started
    volumes:
      - btcpay_data:/datadir

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI (opciono)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  jasmin:
    image: jookies/jasmin:latest          # ili jookies/jasmin:0.10 ako hoćeš stabilnu
    container_name: jasmin
    restart: unless-stopped
    depends_on:
      - redis
      - rabbitmq
    ports:
      - "2775:2775"    # SMPP Server (za tvoje klijente)
      - "8990:8990"    # jCLI (komandna linija)
      - "1401:1401"    # HTTP API (za tvoju aplikaciju)
    volumes:
      - ./jasmin-data/store:/etc/jasmin/store
      - ./jasmin-data/log:/var/log/jasmin
    environment:
      - JASMIN_REDIS_HOST=redis
      - JASMIN_AMQP_HOST=rabbitmq
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 525M
volumes:
  btcpay_data:
  postgres_data:
  bitcoin_data:
  nbxplorer_data: